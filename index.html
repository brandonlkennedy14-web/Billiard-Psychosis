<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Ruliad Billiards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            image-rendering: pixelated;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            text-shadow: 2px 2px 0 #000;
            color: #aaa;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px;
            border: 2px solid #333;
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .hud span { flex: 1; text-align: center; }
        .hud-highlight { color: #0ff; }
        .hud-alert { color: #f0f; }
        .hud-mic { color: #ff0; cursor: pointer; }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="hud" id="ui-panel">
        <span>DIMENSION: <span id="ui-dim" class="hud-highlight">1</span></span>
        <span>WINDING: <span id="ui-winding" class="hud-highlight">0</span></span>
        <span>PRECISION: <span id="ui-precision" class="hud-highlight">0.0000</span></span>
        <span id="ui-mic" class="hud-mic">[CLICK FOR AUDIO]</span>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- BACKGROUND RULIAD SETUP ---
        const ruliadCanvas = document.createElement('canvas');
        const rCtx = ruliadCanvas.getContext('2d');
        const CA_PIXEL = 6;
        let CA_W = 1, CA_H = 1, caData;
        
        // --- BOARD RULIAD (POOL TABLE) SETUP ---
        const boardCanvas = document.createElement('canvas');
        const bCtx = boardCanvas.getContext('2d');
        const B_CA_SIZE = 80; 
        boardCanvas.width = B_CA_SIZE;
        boardCanvas.height = B_CA_SIZE;
        
        // Dual buffer system: CA logic and Trail/Voice logic
        let bData = new Uint8Array(B_CA_SIZE * B_CA_SIZE);
        let bDataNext = new Uint8Array(B_CA_SIZE * B_CA_SIZE);
        let trailData = new Uint8Array(B_CA_SIZE * B_CA_SIZE); // Tracks balls and voice
        
        // The Four Colors (Board Base, CA Output, Ball Trail, Voice Input)
        let colBoardBg = [10, 20, 35];     // Deep Navy
        let colBoardCA = [0, 255, 150];    // Neon Green Parity
        let colTrail   = [255, 0, 150];    // Hot Pink Ball Trail
        let colVoice   = [255, 255, 0];    // Bright Yellow Voice Standing Wave
        
        let WIDTH = window.innerWidth || 800;
        let HEIGHT = window.innerHeight || 600;
        let boardRect = { x: 0, y: 0, size: 0 };
        
        let currentRule = 30;
        let frameCount = 0;

        // Visual Palettes for Dimensions
        let munkerColor1 = 'rgba(0, 255, 255, 1)'; // Solid Cyan
        let munkerColor2 = 'rgba(255, 0, 255, 1)'; // Solid Magenta

        let gameState = {
            dimension: 1,
            winding: 0,
            precision: "0.0000"
        };

        let shockwaves = [];

        // --- AUDIO ENGINE ---
        let audioCtx, analyser, dataArray;
        let micEnabled = false;
        let currentAudioLevel = 0;

        async function initAudio() {
            if (micEnabled) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                micEnabled = true;
                document.getElementById('ui-mic').innerText = "SONIC DRIVE: ON";
                document.getElementById('ui-mic').style.color = "#0f0";
            } catch (err) {
                document.getElementById('ui-mic').innerText = "MIC DENIED";
                document.getElementById('ui-mic').style.color = "#f00";
            }
        }
        document.addEventListener('click', initAudio, { once: true });

        // --- RESIZE ---
        function resize() {
            WIDTH = canvas.width = window.innerWidth || 320;
            HEIGHT = canvas.height = window.innerHeight || 320;
            
            CA_W = Math.max(1, Math.ceil(WIDTH / CA_PIXEL));
            CA_H = Math.max(1, Math.ceil(HEIGHT / CA_PIXEL));
            
            ruliadCanvas.width = CA_W;
            ruliadCanvas.height = CA_H;
            caData = new Uint8Array(CA_W * CA_H);
            caData[Math.floor(CA_W / 2)] = 1;

            boardRect.size = Math.max(10, Math.min(WIDTH, HEIGHT) * 0.75);
            boardRect.x = (WIDTH - boardRect.size) / 2;
            boardRect.y = (HEIGHT - boardRect.size) / 2 + 20; 
        }

        window.addEventListener('resize', () => { resize(); initBalls(); });

        // --- DIMENSION LOGIC ---
        function nextDimension() {
            gameState.dimension++;
            document.getElementById('ui-dim').innerText = gameState.dimension;
            
            document.getElementById('ui-panel').style.borderColor = '#f0f';
            setTimeout(() => document.getElementById('ui-panel').style.borderColor = '#333', 300);

            const interestingRules = [30, 90, 110, 54, 18, 22, 126, 150];
            currentRule = interestingRules[Math.floor(Math.random() * interestingRules.length)];

            // Randomize Colors for the new dimension
            colBoardBg = [Math.random()*30, Math.random()*30, Math.random()*50];
            colBoardCA = [Math.random()*255, Math.random()*255, Math.random()*255];
            colTrail   = [Math.random()*255, Math.random()*255, Math.random()*255];
            colVoice   = [Math.random()*255, Math.random()*255, Math.random()*255];

            const hues = [0, 60, 120, 180, 240, 300];
            const h1 = hues[Math.floor(Math.random() * hues.length)];
            const h2 = (h1 + 180) % 360; 
            munkerColor1 = `hsla(${h1}, 100%, 50%, 1)`; // Solid
            munkerColor2 = `hsla(${h2}, 100%, 50%, 1)`; // Solid

            caData.fill(0);
            bData.fill(0);
            trailData.fill(0);
            if (caData.length > 0) caData[Math.floor(CA_W / 2)] = 1;

            initBalls();
        }

        // --- PHYSICS & BALLS ---
        const POCKET_RADIUS = 20;

        class Ball {
            constructor(x, y, vx, vy, radius) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.radius = radius;
                this.lastCornerHit = 0;
                this.angle = 0; 
                this.trueColor = '#bbaaff'; // A neutral, light color works best for Munker-White assimilation
            }

            update() {
                if (micEnabled && currentAudioLevel > 30) {
                    const cx = boardRect.x + boardRect.size / 2;
                    const cy = boardRect.y + boardRect.size / 2;
                    const dx = this.x - cx;
                    const dy = this.y - cy;
                    const dist = Math.hypot(dx, dy) || 1;
                    
                    const force = (currentAudioLevel * 0.005) / (dist * 0.01);
                    this.vx += (dx / dist) * force;
                    this.vy += (dy / dist) * force;
                }

                const speed = Math.hypot(this.vx, this.vy);
                if (speed > 8) {
                    this.vx = (this.vx / speed) * 8;
                    this.vy = (this.vy / speed) * 8;
                }

                this.x += this.vx; 
                this.y += this.vy;
                this.angle += speed * 0.08;

                // Write to the Trail/Voice Array (Standing Wave Injection)
                const caX = Math.floor(((this.x - boardRect.x) / boardRect.size) * B_CA_SIZE);
                const caY = Math.floor(((this.y - boardRect.y) / boardRect.size) * B_CA_SIZE);
                
                let brushRadius = 1;
                let injectionHeat = 120; // Normal trail heat
                
                if (micEnabled && currentAudioLevel > 20) {
                    brushRadius = Math.max(2, Math.floor(currentAudioLevel / 15));
                    injectionHeat = 255; // Max heat triggers Voice Color
                }
                
                for(let dy = -brushRadius; dy <= brushRadius; dy++) {
                    for(let dx = -brushRadius; dx <= brushRadius; dx++) {
                        if(dx*dx + dy*dy <= brushRadius*brushRadius) {
                            const nx = caX + dx, ny = caY + dy;
                            if(nx >= 0 && nx < B_CA_SIZE && ny >= 0 && ny < B_CA_SIZE) {
                                // Add to board CA buffer for parallax ripples
                                bData[ny * B_CA_SIZE + nx] = 255;
                                // Add to trail data for the 4-color distinction
                                trailData[ny * B_CA_SIZE + nx] = injectionHeat;
                            }
                        }
                    }
                }

                const corners = [
                    {x: boardRect.x, y: boardRect.y},
                    {x: boardRect.x + boardRect.size, y: boardRect.y},
                    {x: boardRect.x, y: boardRect.y + boardRect.size},
                    {x: boardRect.x + boardRect.size, y: boardRect.y + boardRect.size}
                ];
                
                const dists = corners.map(c => Math.hypot(this.x - c.x, this.y - c.y));
                const minDist = Math.min(...dists);
                
                if (minDist < POCKET_RADIUS + this.radius) {
                    nextDimension();
                    return; 
                }

                const minX = boardRect.x + this.radius;
                const maxX = boardRect.x + boardRect.size - this.radius;
                const minY = boardRect.y + this.radius;
                const maxY = boardRect.y + boardRect.size - this.radius;

                let hitWall = false;
                if (this.x <= minX) { this.x = minX; this.vx *= -1; hitWall = true; }
                if (this.x >= maxX) { this.x = maxX; this.vx *= -1; hitWall = true; }
                if (this.y <= minY) { this.y = minY; this.vy *= -1; hitWall = true; }
                if (this.y >= maxY) { this.y = maxY; this.vy *= -1; hitWall = true; }

                const detectionRadius = 50; 
                if (hitWall && minDist < detectionRadius && frameCount - this.lastCornerHit > 15) {
                    gameState.winding++;
                    const calcPrecision = 1 - (minDist / detectionRadius);
                    gameState.precision = calcPrecision.toFixed(4);
                    this.lastCornerHit = frameCount;
                    
                    document.getElementById('ui-winding').innerText = gameState.winding;
                    document.getElementById('ui-precision').innerText = gameState.precision;
                    document.getElementById('ui-panel').style.borderColor = '#0ff';
                    setTimeout(() => document.getElementById('ui-panel').style.borderColor = '#333', 150);
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath(); ctx.arc(4, 4, this.radius, 0, Math.PI * 2); ctx.fill();

                // Rotate for the rolling effect
                ctx.rotate(this.angle);

                // Base Sphere
                ctx.fillStyle = this.trueColor;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();

                // Billiard Inner White Circle
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(this.radius*0.2, 0, this.radius * 0.5, 0, Math.PI * 2); ctx.fill();
                
                // Billiard Number/Dot
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(this.radius*0.2, 0, this.radius * 0.2, 0, Math.PI * 2); ctx.fill();

                ctx.restore();

                // Specular Light Highlight (Static, does not rotate)
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath(); ctx.arc(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.2, 0, Math.PI * 2); ctx.fill();
            }
        }

        let balls = [];
        function initBalls() {
            balls = [
                new Ball(boardRect.x + boardRect.size*0.3, boardRect.y + boardRect.size*0.5, 3.5, 2.8, 16),
                new Ball(boardRect.x + boardRect.size*0.7, boardRect.y + boardRect.size*0.5, -2.8, -3.5, 16)
            ];
        }

        // --- RENDERING ---
        function updateBackgroundRuliad() {
            if (CA_W <= 0 || CA_H <= 0) return;

            for (let y = CA_H - 1; y > 0; y--) {
                for (let x = 0; x < CA_W; x++) {
                    caData[y * CA_W + x] = caData[(y - 1) * CA_W + x];
                }
            }
            
            if (micEnabled && currentAudioLevel > 10) {
                const step = Math.max(1, Math.floor((dataArray.length / 2) / CA_W));
                for (let x = 0; x < CA_W; x++) {
                    const audioVal = dataArray[x * step] || 0;
                    caData[x] = (audioVal > 70 + Math.random() * 50) ? 1 : 0;
                }
            } else {
                for (let x = 0; x < CA_W; x++) {
                    const left = caData[x === 0 ? CA_W - 1 : x - 1] ? 4 : 0;
                    const center = caData[x] ? 2 : 0;
                    const right = caData[x === CA_W - 1 ? 0 : x + 1] ? 1 : 0;
                    caData[x] = (currentRule & (1 << (left + center + right))) ? 1 : 0;
                }
            }

            const imgData = rCtx.createImageData(CA_W, CA_H);
            const basePhase = gameState.dimension * 50 + frameCount * 3;

            for (let y = 0; y < CA_H; y++) {
                const r = Math.sin((basePhase + y * 4) * 0.05) * 127 + 128;
                const g = Math.sin((basePhase + y * 4 + 120) * 0.05) * 127 + 128;
                const b = Math.sin((basePhase + y * 4 + 240) * 0.05) * 127 + 128;

                for (let x = 0; x < CA_W; x++) {
                    const i = y * CA_W + x;
                    const idx = i * 4;
                    if (caData[i] > 0) {
                        imgData.data[idx] = r; imgData.data[idx+1] = g; imgData.data[idx+2] = b; imgData.data[idx+3] = 255;
                    } else {
                        imgData.data[idx] = 0; imgData.data[idx+1] = 5; imgData.data[idx+2] = 10; imgData.data[idx+3] = 255;
                    }                   
                }
            }
            rCtx.putImageData(imgData, 0, 0);
        }

        function updateBoardCA() {
            // Fade Trail/Voice Data
            for(let i = 0; i < trailData.length; i++) {
                if(trailData[i] > 0) trailData[i] = Math.max(0, trailData[i] - 4);
            }

            // Parity Rule for Board Geometry
            for (let y = 0; y < B_CA_SIZE; y++) {
                for (let x = 0; x < B_CA_SIZE; x++) {
                    const i = y * B_CA_SIZE + x;
                    let n = 0;
                    
                    if (y > 0 && bData[i - B_CA_SIZE] > 128) n++;
                    if (y < B_CA_SIZE - 1 && bData[i + B_CA_SIZE] > 128) n++;
                    if (x > 0 && bData[i - 1] > 128) n++;
                    if (x < B_CA_SIZE - 1 && bData[i + 1] > 128) n++;

                    if (n % 2 !== 0 && n > 0) {
                        bDataNext[i] = 255; 
                    } else {
                        bDataNext[i] = Math.max(0, bData[i] - 10); 
                    }
                }
            }

            const imgData = bCtx.createImageData(B_CA_SIZE, B_CA_SIZE);
            for (let i = 0; i < B_CA_SIZE * B_CA_SIZE; i++) {
                bData[i] = bDataNext[i]; 
                
                // Color Logic (4 Colors)
                let r = colBoardBg[0], g = colBoardBg[1], b = colBoardBg[2];

                if (bData[i] > 128) {
                    r = colBoardCA[0]; g = colBoardCA[1]; b = colBoardCA[2];
                }

                if (trailData[i] > 0) {
                    let t = trailData[i] / 255; 
                    // Voice is high value (yellow), standard trail is mid value (pink)
                    let targetCol = trailData[i] > 150 ? colVoice : colTrail;
                    
                    r = r * (1-t) + targetCol[0] * t;
                    g = g * (1-t) + targetCol[1] * t;
                    b = b * (1-t) + targetCol[2] * t;
                }

                const idx = i * 4;
                imgData.data[idx] = Math.floor(r);
                imgData.data[idx+1] = Math.floor(g);
                imgData.data[idx+2] = Math.floor(b);
                imgData.data[idx+3] = 255;
            }
            bCtx.putImageData(imgData, 0, 0);
        }

        function drawBoard() {
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(boardCanvas, boardRect.x, boardRect.y, boardRect.size, boardRect.size);

            ctx.strokeStyle = '#444';
            ctx.lineWidth = 4;
            ctx.strokeRect(boardRect.x, boardRect.y, boardRect.size, boardRect.size);

            ctx.fillStyle = '#000';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            const corners = [
                {x: boardRect.x, y: boardRect.y},
                {x: boardRect.x + boardRect.size, y: boardRect.y},
                {x: boardRect.x, y: boardRect.y + boardRect.size},
                {x: boardRect.x + boardRect.size, y: boardRect.y + boardRect.size}
            ];
            corners.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            });
        }

        function drawMunkerWhiteIllusion() {
            // True Munker-White: Solid, highly contrasting intersecting lines
            ctx.save();
            ctx.beginPath();
            ctx.rect(boardRect.x, boardRect.y, boardRect.size, boardRect.size);
            ctx.clip();
            
            const stripeH = CA_PIXEL; // Thin, sharp stripes
            
            // The stripes remain static to perfectly trick assimilation as balls roll beneath them
            for (let y = boardRect.y; y < boardRect.y + boardRect.size; y += stripeH * 4) {
                // Color 1 line
                ctx.fillStyle = munkerColor1; 
                ctx.fillRect(boardRect.x, y, boardRect.size, stripeH);
                
                // Color 2 line
                ctx.fillStyle = munkerColor2;
                ctx.fillRect(boardRect.x, y + stripeH * 2, boardRect.size, stripeH);
            }
            ctx.restore();
        }

        function loop() {
            frameCount++;

            if (micEnabled) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                currentAudioLevel = sum / dataArray.length;

                if (currentAudioLevel > 40 && frameCount % 8 === 0) {
                    shockwaves.push({ r: POCKET_RADIUS, force: currentAudioLevel, color: `rgb(${colVoice.join(',')})` });
                }
            }

            if (frameCount % 4 === 0) updateBackgroundRuliad();
            updateBoardCA();

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            if (ruliadCanvas.width > 0 && ruliadCanvas.height > 0) {
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(ruliadCanvas, 0, 0, WIDTH, HEIGHT);
            }

            // Draw Board and internal standing wave patterns
            drawBoard();

            const cx = boardRect.x + boardRect.size / 2;
            const cy = boardRect.y + boardRect.size / 2;
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.r += sw.force * 0.15; 
                ctx.strokeStyle = sw.color;
                ctx.globalAlpha = 1 - sw.r/(boardRect.size*0.7);
                ctx.lineWidth = 5;
                ctx.beginPath(); ctx.arc(cx, cy, sw.r, 0, Math.PI*2); ctx.stroke();
                ctx.globalAlpha = 1;
                if (sw.r > boardRect.size * 0.75) shockwaves.splice(i, 1);
            }

            // Draw Balls
            balls.forEach(b => {
                b.update();
                b.draw(ctx);
            });

            // Draw True Munker-White Overlay
            drawMunkerWhiteIllusion();

            requestAnimationFrame(loop);
        }

        resize();
        initBalls();
        loop();
    </script>
</body>
</html>
