<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Ruliad Billiards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            image-rendering: pixelated;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            text-shadow: 2px 2px 0 #000;
            color: #aaa;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px;
            border: 2px solid #333;
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .hud span { flex: 1; text-align: center; }
        .hud-highlight { color: #0ff; }
        .hud-alert { color: #f0f; }
        .hud-mic { color: #ff0; cursor: pointer; }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="hud" id="ui-panel">
        <span>DIM: <span id="ui-dim" class="hud-highlight">1 (SQUARE)</span></span>
        <span>WINDING: <span id="ui-winding" class="hud-highlight">0</span></span>
        <span>PRECISION: <span id="ui-precision" class="hud-highlight">0.0000</span></span>
        <span id="ui-mic" class="hud-mic">[CLICK FOR AUDIO]</span>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- BACKGROUND RULIAD SETUP ---
        const ruliadCanvas = document.createElement('canvas');
        const rCtx = ruliadCanvas.getContext('2d');
        const CA_PIXEL = 6;
        let CA_W = 1, CA_H = 1, caData;
        
        // --- BOARD RULIAD (POOL TABLE) SETUP ---
        const boardCanvas = document.createElement('canvas');
        const bCtx = boardCanvas.getContext('2d');
        const B_CA_SIZE = 100; // Increased density for standing wave texture
        boardCanvas.width = B_CA_SIZE;
        boardCanvas.height = B_CA_SIZE;
        
        let bData = new Uint8Array(B_CA_SIZE * B_CA_SIZE);
        let bDataNext = new Uint8Array(B_CA_SIZE * B_CA_SIZE);
        let trailData = new Uint8Array(B_CA_SIZE * B_CA_SIZE); 
        
        let colBoardBg = [10, 20, 35];     
        let colBoardCA = [0, 255, 150];    
        let colTrail   = [255, 0, 150];    
        let colVoice   = [255, 255, 0];    
        
        let WIDTH = window.innerWidth || 800;
        let HEIGHT = window.innerHeight || 600;
        
        // Dynamic Geometry State
        let boardPoly = { sides: 4, cx: 0, cy: 0, r: 0, vertices: [] };
        let boardRect = { x: 0, y: 0, size: 0 };
        
        let currentRule = 30;
        let frameCount = 0;
        let baseMunkerHue = 0; // Drifts endlessly

        const SHAPE_NAMES = { 3: 'TRIANGLE', 4: 'SQUARE', 5: 'PENTAGON', 6: 'HEXAGON', 8: 'OCTAGON' };

        let gameState = {
            dimension: 1,
            winding: 0,
            precision: "0.0000"
        };

        let shockwaves = [];

        // --- AUDIO ENGINE ---
        let audioCtx, analyser, dataArray;
        let micEnabled = false;
        let currentAudioLevel = 0;

        async function initAudio() {
            if (micEnabled) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                micEnabled = true;
                document.getElementById('ui-mic').innerText = "SONIC DRIVE: ON";
                document.getElementById('ui-mic').style.color = "#0f0";
            } catch (err) {
                document.getElementById('ui-mic').innerText = "MIC DENIED";
                document.getElementById('ui-mic').style.color = "#f00";
            }
        }
        document.addEventListener('click', initAudio, { once: true });

        // --- GEOMETRY GENERATOR ---
        function generateGeometry(sides) {
            const cx = WIDTH / 2;
            const cy = HEIGHT / 2 + 20;
            const R = Math.max(10, Math.min(WIDTH, HEIGHT) * 0.4); 
            
            let verts = [];
            // Start angle offsets to make shapes sit flat at the bottom
            let startAngle = sides % 2 === 0 ? Math.PI / sides : -Math.PI / 2; 
            
            for(let i=0; i<sides; i++) {
                let angle = startAngle + (i * 2 * Math.PI / sides);
                verts.push({ x: cx + R * Math.cos(angle), y: cy + R * Math.sin(angle) });
            }
            
            boardPoly = { sides, cx, cy, r: R, vertices: verts };
            boardRect = { x: cx - R, y: cy - R, size: R * 2 };
        }

        // --- RESIZE ---
        function resize() {
            WIDTH = canvas.width = window.innerWidth || 320;
            HEIGHT = canvas.height = window.innerHeight || 320;
            
            CA_W = Math.max(1, Math.ceil(WIDTH / CA_PIXEL));
            CA_H = Math.max(1, Math.ceil(HEIGHT / CA_PIXEL));
            
            ruliadCanvas.width = CA_W;
            ruliadCanvas.height = CA_H;
            caData = new Uint8Array(CA_W * CA_H);
            caData[Math.floor(CA_W / 2)] = 1;

            generateGeometry(boardPoly.sides);
        }

        window.addEventListener('resize', () => { resize(); initBall(); });

        // --- DIMENSION LOGIC ---
        function nextDimension() {
            gameState.dimension++;
            
            document.getElementById('ui-panel').style.borderColor = '#f0f';
            setTimeout(() => document.getElementById('ui-panel').style.borderColor = '#333', 300);

            // Morph the world geometry
            const possibleSides = [3, 4, 5, 6, 8];
            const newSides = possibleSides[Math.floor(Math.random() * possibleSides.length)];
            generateGeometry(newSides);
            
            document.getElementById('ui-dim').innerText = `${gameState.dimension} (${SHAPE_NAMES[newSides]})`;

            const interestingRules = [30, 90, 110, 54, 18, 22, 126, 150];
            currentRule = interestingRules[Math.floor(Math.random() * interestingRules.length)];

            // Randomize Parity Board & Standing Wave Colors
            colBoardBg = [Math.random()*30, Math.random()*30, Math.random()*50];
            colBoardCA = [Math.random()*255, Math.random()*255, Math.random()*255];
            colTrail   = [Math.random()*255, Math.random()*255, Math.random()*255];
            colVoice   = [Math.random()*255, Math.random()*255, Math.random()*255];

            // Add a jolt to the Munker Hue
            baseMunkerHue = (baseMunkerHue + 90) % 360;

            caData.fill(0);
            bData.fill(0);
            trailData.fill(0);
            if (caData.length > 0) caData[Math.floor(CA_W / 2)] = 1;

            initBall();
        }

        // --- PHYSICS & BALL ---
        const POCKET_RADIUS = 22;

        class Ball {
            constructor(x, y, vx, vy, radius) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.radius = radius;
                this.lastCornerHit = 0;
                this.angle = 0; 
                this.trueColor = '#e0e0e0'; // Neutral bright sphere absorbs Munker-White stripes perfectly
            }

            update() {
                // Sonic Drive Impulse
                if (micEnabled && currentAudioLevel > 30) {
                    const dx = this.x - boardPoly.cx;
                    const dy = this.y - boardPoly.cy;
                    const dist = Math.hypot(dx, dy) || 1;
                    
                    const force = (currentAudioLevel * 0.006) / (dist * 0.01);
                    this.vx += (dx / dist) * force;
                    this.vy += (dy / dist) * force;
                }

                const speed = Math.hypot(this.vx, this.vy);
                if (speed > 9) {
                    this.vx = (this.vx / speed) * 9;
                    this.vy = (this.vy / speed) * 9;
                }

                this.x += this.vx; 
                this.y += this.vy;
                this.angle += speed * 0.08;

                // Write Standing Wave Trajectory
                const caX = Math.floor(((this.x - boardRect.x) / boardRect.size) * B_CA_SIZE);
                const caY = Math.floor(((this.y - boardRect.y) / boardRect.size) * B_CA_SIZE);
                
                let brushRadius = 1;
                let injectionHeat = 150; 
                
                if (micEnabled && currentAudioLevel > 20) {
                    brushRadius = Math.max(2, Math.floor(currentAudioLevel / 15));
                    injectionHeat = 255; 
                }
                
                for(let dy = -brushRadius; dy <= brushRadius; dy++) {
                    for(let dx = -brushRadius; dx <= brushRadius; dx++) {
                        if(dx*dx + dy*dy <= brushRadius*brushRadius) {
                            const nx = caX + dx, ny = caY + dy;
                            if(nx >= 0 && nx < B_CA_SIZE && ny >= 0 && ny < B_CA_SIZE) {
                                bData[ny * B_CA_SIZE + nx] = 255;
                                trailData[ny * B_CA_SIZE + nx] = injectionHeat;
                            }
                        }
                    }
                }

                // 1. POCKET SINK LOGIC (Pre-check vertices)
                for (let v of boardPoly.vertices) {
                    if (Math.hypot(this.x - v.x, this.y - v.y) < POCKET_RADIUS + this.radius * 0.5) {
                        nextDimension();
                        return; 
                    }
                }

                // 2. POLYGON EDGE COLLISION (Infinite Plane Approach)
                let hitWall = false;
                let minDistToVertex = Infinity;

                for(let i=0; i<boardPoly.sides; i++) {
                    let A = boardPoly.vertices[i];
                    let B = boardPoly.vertices[(i+1)%boardPoly.sides];
                    
                    // Edge normal
                    let nx = -(B.y - A.y);
                    let ny = (B.x - A.x);
                    let len = Math.hypot(nx, ny);
                    nx /= len; ny /= len;
                    
                    // Ensure normal points inward towards polygon center
                    if (nx * (boardPoly.cx - A.x) + ny * (boardPoly.cy - A.y) < 0) {
                        nx = -nx; ny = -ny;
                    }
                    
                    // Distance from ball to edge plane
                    let distToPlane = (this.x - A.x) * nx + (this.y - A.y) * ny;
                    
                    if (distToPlane < this.radius) {
                        // Push out to resolve penetration
                        this.x += nx * (this.radius - distToPlane);
                        this.y += ny * (this.radius - distToPlane);
                        
                        // Reflect velocity if moving toward the plane
                        let dot = this.vx * nx + this.vy * ny;
                        if (dot < 0) {
                            this.vx -= 2 * dot * nx;
                            this.vy -= 2 * dot * ny;
                            hitWall = true;
                        }
                    }
                    
                    // Track nearest vertex for Precision math
                    let dToV = Math.hypot(this.x - A.x, this.y - A.y);
                    if (dToV < minDistToVertex) minDistToVertex = dToV;
                }

                // 3. NILS BERGLAND PRECISION LOGIC
                const detectionRadius = 50; 
                if (hitWall && minDistToVertex < detectionRadius && frameCount - this.lastCornerHit > 15) {
                    gameState.winding++;
                    const calcPrecision = 1 - (minDistToVertex / detectionRadius);
                    gameState.precision = calcPrecision.toFixed(4);
                    this.lastCornerHit = frameCount;
                    
                    document.getElementById('ui-winding').innerText = gameState.winding;
                    document.getElementById('ui-precision').innerText = gameState.precision;
                    document.getElementById('ui-panel').style.borderColor = '#0ff';
                    setTimeout(() => document.getElementById('ui-panel').style.borderColor = '#333', 150);
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath(); ctx.arc(4, 4, this.radius, 0, Math.PI * 2); ctx.fill();

                // Rotate
                ctx.rotate(this.angle);

                // Sphere
                ctx.fillStyle = this.trueColor;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();

                // Inner White Ring
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(this.radius*0.2, 0, this.radius * 0.5, 0, Math.PI * 2); ctx.fill();
                
                // Center Dot
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(this.radius*0.2, 0, this.radius * 0.2, 0, Math.PI * 2); ctx.fill();

                ctx.restore();

                // Specular Light Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath(); ctx.arc(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.2, 0, Math.PI * 2); ctx.fill();
            }
        }

        let playerBall;
        function initBall() {
            // Drop ball near center
            playerBall = new Ball(boardPoly.cx - 20, boardPoly.cy - 20, 3.5, 2.8, 16);
        }

        // --- RENDERING ---
        function updateBackgroundRuliad() {
            if (CA_W <= 0 || CA_H <= 0) return;

            for (let y = CA_H - 1; y > 0; y--) {
                for (let x = 0; x < CA_W; x++) {
                    caData[y * CA_W + x] = caData[(y - 1) * CA_W + x];
                }
            }
            
            if (micEnabled && currentAudioLevel > 10) {
                const step = Math.max(1, Math.floor((dataArray.length / 2) / CA_W));
                for (let x = 0; x < CA_W; x++) {
                    const audioVal = dataArray[x * step] || 0;
                    caData[x] = (audioVal > 70 + Math.random() * 50) ? 1 : 0;
                }
            } else {
                for (let x = 0; x < CA_W; x++) {
                    const left = caData[x === 0 ? CA_W - 1 : x - 1] ? 4 : 0;
                    const center = caData[x] ? 2 : 0;
                    const right = caData[x === CA_W - 1 ? 0 : x + 1] ? 1 : 0;
                    caData[x] = (currentRule & (1 << (left + center + right))) ? 1 : 0;
                }
            }

            const imgData = rCtx.createImageData(CA_W, CA_H);
            const basePhase = gameState.dimension * 50 + frameCount * 3;

            for (let y = 0; y < CA_H; y++) {
                const r = Math.sin((basePhase + y * 4) * 0.05) * 127 + 128;
                const g = Math.sin((basePhase + y * 4 + 120) * 0.05) * 127 + 128;
                const b = Math.sin((basePhase + y * 4 + 240) * 0.05) * 127 + 128;

                for (let x = 0; x < CA_W; x++) {
                    const i = y * CA_W + x;
                    const idx = i * 4;
                    if (caData[i] > 0) {
                        imgData.data[idx] = r; imgData.data[idx+1] = g; imgData.data[idx+2] = b; imgData.data[idx+3] = 255;
                    } else {
                        imgData.data[idx] = 0; imgData.data[idx+1] = 5; imgData.data[idx+2] = 10; imgData.data[idx+3] = 255;
                    }                   
                }
            }
            rCtx.putImageData(imgData, 0, 0);
        }

        function updateBoardCA() {
            for(let i = 0; i < trailData.length; i++) {
                if(trailData[i] > 0) trailData[i] = Math.max(0, trailData[i] - 3);
            }

            for (let y = 0; y < B_CA_SIZE; y++) {
                for (let x = 0; x < B_CA_SIZE; x++) {
                    const i = y * B_CA_SIZE + x;
                    let n = 0;
                    
                    if (y > 0 && bData[i - B_CA_SIZE] > 128) n++;
                    if (y < B_CA_SIZE - 1 && bData[i + B_CA_SIZE] > 128) n++;
                    if (x > 0 && bData[i - 1] > 128) n++;
                    if (x < B_CA_SIZE - 1 && bData[i + 1] > 128) n++;

                    if (n % 2 !== 0 && n > 0) {
                        bDataNext[i] = 255; 
                    } else {
                        bDataNext[i] = Math.max(0, bData[i] - 15); 
                    }
                }
            }

            const imgData = bCtx.createImageData(B_CA_SIZE, B_CA_SIZE);
            for (let i = 0; i < B_CA_SIZE * B_CA_SIZE; i++) {
                bData[i] = bDataNext[i]; 
                
                let r = colBoardBg[0], g = colBoardBg[1], b = colBoardBg[2];

                if (bData[i] > 128) {
                    r = colBoardCA[0]; g = colBoardCA[1]; b = colBoardCA[2];
                }

                if (trailData[i] > 0) {
                    let t = trailData[i] / 255; 
                    let targetCol = trailData[i] > 180 ? colVoice : colTrail;
                    r = r * (1-t) + targetCol[0] * t;
                    g = g * (1-t) + targetCol[1] * t;
                    b = b * (1-t) + targetCol[2] * t;
                }

                const idx = i * 4;
                imgData.data[idx] = Math.floor(r);
                imgData.data[idx+1] = Math.floor(g);
                imgData.data[idx+2] = Math.floor(b);
                imgData.data[idx+3] = 255;
            }
            bCtx.putImageData(imgData, 0, 0);
        }

        function traceBoardPath(ctx) {
            ctx.beginPath();
            ctx.moveTo(boardPoly.vertices[0].x, boardPoly.vertices[0].y);
            for(let i=1; i<boardPoly.sides; i++) {
                ctx.lineTo(boardPoly.vertices[i].x, boardPoly.vertices[i].y);
            }
            ctx.closePath();
        }

        function drawBoard() {
            ctx.save();
            traceBoardPath(ctx);
            ctx.clip(); // Mask CA render to Polygon

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(boardCanvas, boardRect.x, boardRect.y, boardRect.size, boardRect.size);
            ctx.restore();

            // Polygon Boundary Stroke
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 4;
            traceBoardPath(ctx);
            ctx.stroke();

            // Draw Pockets at Vertices
            ctx.fillStyle = '#000';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            
            boardPoly.vertices.forEach(v => {
                ctx.beginPath();
                ctx.arc(v.x, v.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            });
        }

        function drawDynamicMunkerWhite() {
            ctx.save();
            traceBoardPath(ctx);
            ctx.clip(); 
            
            // Thin lines maximize assimilation illusion
            const stripeH = 3; 
            
            // Endlessly drifting complementary colors
            baseMunkerHue = (baseMunkerHue + 0.15) % 360;
            const h1 = baseMunkerHue;
            const h2 = (baseMunkerHue + 180) % 360; // Perfect mathematical complementary
            
            const color1 = `hsla(${h1}, 100%, 50%, 0.8)`;
            const color2 = `hsla(${h2}, 100%, 50%, 0.8)`;
            
            for (let y = boardRect.y; y < boardRect.y + boardRect.size; y += stripeH * 4) {
                ctx.fillStyle = color1; 
                ctx.fillRect(boardRect.x, y, boardRect.size, stripeH);
                
                ctx.fillStyle = color2;
                ctx.fillRect(boardRect.x, y + stripeH * 2, boardRect.size, stripeH);
            }
            ctx.restore();
        }

        function loop() {
            frameCount++;

            if (micEnabled) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                currentAudioLevel = sum / dataArray.length;

                if (currentAudioLevel > 40 && frameCount % 8 === 0) {
                    shockwaves.push({ r: POCKET_RADIUS, force: currentAudioLevel, color: `rgb(${colVoice.join(',')})` });
                }
            }

            if (frameCount % 4 === 0) updateBackgroundRuliad();
            updateBoardCA();

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            if (ruliadCanvas.width > 0 && ruliadCanvas.height > 0) {
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(ruliadCanvas, 0, 0, WIDTH, HEIGHT);
            }

            // Draw Polygon Board
            drawBoard();

            // Sonic Shockwaves
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.r += sw.force * 0.15; 
                ctx.strokeStyle = sw.color;
                ctx.globalAlpha = Math.max(0, 1 - sw.r/(boardPoly.r * 1.5));
                ctx.lineWidth = 5;
                ctx.beginPath(); ctx.arc(boardPoly.cx, boardPoly.cy, sw.r, 0, Math.PI*2); ctx.stroke();
                ctx.globalAlpha = 1;
                if (sw.r > boardPoly.r * 2) shockwaves.splice(i, 1);
            }

            // Single Ball Update & Draw
            if (playerBall) {
                playerBall.update();
                playerBall.draw(ctx);
            }

            // Munker-White Harmonics
            drawDynamicMunkerWhite();

            requestAnimationFrame(loop);
        }

        // Init
        generateGeometry(4); // Start with square
        resize();
        initBall();
        loop();
    </script>
</body>
</html>
