<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Ruliad Billiards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            image-rendering: pixelated;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
            color: #0ff;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border: 2px solid #0ff;
        }

        .hud span { flex: 1; text-align: center; }
        .hud-highlight { color: #f0f; }
        .hud-mic { color: #ff0; cursor: pointer; }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }

        .bmc-link {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #f0f;
            text-decoration: none;
            font-size: 10px;
            z-index: 20;
            text-shadow: 2px 2px 0 #000;
            transition: color 0.2s;
        }
        
        .bmc-link:hover {
            color: #0ff;
        }
    </style>
</head>
<body>

    <div class="hud" id="ui-panel">
        <span>DIM: <span id="ui-dim" class="hud-highlight">1</span></span>
        <span>BOUNCES: <span id="ui-winding" class="hud-highlight">0</span></span>
        <span class="hidden md:inline">PRECISION: <span id="ui-precision" class="hud-highlight">0.0000</span></span>
        <span>BEST: <span id="ui-best" class="hud-highlight">0</span></span>
        <span id="ui-mic" class="hud-mic">[CLICK FOR AUDIO]</span>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>
    <a href="https://buymeacoffee.com/brandonkennedy" target="_blank" class="bmc-link">BUYMEACOFFEE.COM/BRANDONKENNEDY</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- BACKGROUND RULIAD SETUP ---
        const ruliadCanvas = document.createElement('canvas');
        const rCtx = ruliadCanvas.getContext('2d');
        const CA_PIXEL = 8;
        let CA_W = 1, CA_H = 1, caData;
        
        // --- BOARD RULIAD (POOL TABLE) SETUP ---
        const boardCanvas = document.createElement('canvas');
        const bCtx = boardCanvas.getContext('2d');
        const B_CA_SIZE = 64; 
        boardCanvas.width = B_CA_SIZE;
        boardCanvas.height = B_CA_SIZE;
        
        // Double buffer for feedback math
        let bData = new Uint8Array(B_CA_SIZE * B_CA_SIZE); 
        let bDataNext = new Uint8Array(B_CA_SIZE * B_CA_SIZE); 
        let trailData = new Uint8Array(B_CA_SIZE * B_CA_SIZE); 
        
        const palettes = [
            [[0,255,255], [255,0,255], [255,255,0], [0,0,255]], 
            [[0,255,0], [128,0,128], [0,128,255], [255,165,0]], 
            [[255,0,100], [0,255,100], [100,0,255], [255,255,255]],
            [[255,50,0], [0,255,200], [200,0,255], [255,255,0]]
        ];
        let currentPalette = palettes[0];
        
        // Harmonic Munker-White Pairs
        const munkerPairs = [
            ['#00FFFF', '#FF00FF'], // Cyan / Magenta
            ['#800080', '#00FF00'], // Purple / Green
            ['#0000FF', '#FFFF00'], // Blue / Yellow
            ['#FF0000', '#0000FF']  // Red / Blue
        ];
        let currentMunkerPair = munkerPairs[0];
        
        let WIDTH = window.innerWidth || 800;
        let HEIGHT = window.innerHeight || 600;
        
        // Dynamic Geometry State
        let boardShape = { type: 'POLYGON', cx: 0, cy: 0, r: 0, vertices: [], pockets: [] };
        let boardRect = { x: 0, y: 0, size: 0 };
        
        let currentRule = 0; 
        let frameCount = 0;

        let gameState = {
            dimension: 1,
            bounces: 0,
            best: 0,
            state: 'PLAYING', 
            transitionTimer: 0,
            sinkHole: {x: 0, y: 0} 
        };

        // --- AUDIO ENGINE ---
        let audioCtx, analyser, dataArray;
        let micEnabled = false;
        let currentAudioLevel = 0;

        async function initAudio() {
            if (micEnabled) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                micEnabled = true;
                const uiMic = document.getElementById('ui-mic');
                if (uiMic) {
                    uiMic.innerText = "SONIC DRIVE: ON";
                    uiMic.style.color = "#0f0";
                }
            } catch (err) {
                const uiMic = document.getElementById('ui-mic');
                if (uiMic) {
                    uiMic.innerText = "MIC DENIED";
                    uiMic.style.color = "#f00";
                }
            }
        }
        document.addEventListener('click', initAudio, { once: true });

        // --- GENERATIVE MESH GEOMETRY ---
        function generateGeometry() {
            const cx = WIDTH / 2;
            const cy = HEIGHT / 2 + 25; 
            const R = Math.max(10, Math.min(WIDTH, HEIGHT) * 0.44); 
            
            let verts = [];
            let pockets = [];
            
            const types = ['POLYGON', 'STAR', 'HYPERBOLIC_SQUARE', 'HYPOTROCHOID'];
            const type = types[gameState.dimension % types.length];
            const primeMod = (gameState.dimension * 7) % 5; 
            
            if (type === 'HYPERBOLIC_SQUARE') {
                const resolution = 200;
                const sqBaseR = R * 0.65;
                for(let i=0; i<resolution; i++) {
                    let theta = (i / resolution) * Math.PI * 2;
                    let cosT = Math.abs(Math.cos(theta));
                    let sinT = Math.abs(Math.sin(theta));
                    let rSq = sqBaseR / Math.max(cosT, sinT);
                    let rLobe = R * 0.6 + R * 0.4 * Math.cos(4 * theta);
                    
                    let rFinal = Math.max(rSq, rLobe);
                    verts.push({ x: cx + rFinal * Math.cos(theta), y: cy + rFinal * Math.sin(theta) });
                }
                for(let i=0; i<4; i++) {
                    let angle = (i * Math.PI / 2) + Math.PI/4;
                    let px = cx + (sqBaseR / Math.cos(Math.PI/4)) * Math.cos(angle);
                    let py = cy + (sqBaseR / Math.cos(Math.PI/4)) * Math.sin(angle);
                    pockets.push({x: px, y: py});
                }
            }
            else if (type === 'POLYGON') {
                let sides = primeMod + 4; 
                let startAngle = -Math.PI / 2; 
                for(let i=0; i<sides; i++) {
                    let angle = startAngle + (i * 2 * Math.PI / sides);
                    let px = cx + R * Math.cos(angle);
                    let py = cy + R * Math.sin(angle);
                    verts.push({ x: px, y: py });
                    pockets.push({ x: px, y: py });
                }
            } 
            else if (type === 'STAR') {
                let sides = (primeMod % 3) + 4; 
                let startAngle = -Math.PI / 2; 
                for(let i=0; i<sides * 2; i++) {
                    let r = i % 2 === 0 ? R : R * 0.55; 
                    let angle = startAngle + (i * Math.PI) / sides;
                    let px = cx + r * Math.cos(angle);
                    let py = cy + r * Math.sin(angle);
                    verts.push({ x: px, y: py });
                    if (i % 2 === 0) pockets.push({ x: px, y: py });
                }
            }
            else if (type === 'HYPOTROCHOID') {
                const numLobes = primeMod + 3; 
                const resolution = 200;
                const hr = R * 0.6;
                const pr = hr * (numLobes - 1) / numLobes;
                const d = R * 0.45;
                let maxDist = 0;
                
                for(let i=0; i<resolution; i++) {
                    let theta = (i / resolution) * Math.PI * 2 * numLobes;
                    let x = (hr - pr) * Math.cos(theta) + d * Math.cos(((hr - pr) / pr) * theta);
                    let y = (hr - pr) * Math.sin(theta) - d * Math.sin(((hr - pr) / pr) * theta);
                    verts.push({ x: cx + x, y: cy + y });
                    
                    let dist = Math.hypot(x, y);
                    if (dist > maxDist) maxDist = dist;
                }
                
                for(let i=0; i<verts.length; i++) {
                    let p = verts[i];
                    if (Math.hypot(p.x - cx, p.y - cy) > maxDist * 0.95) {
                        if (!pockets.some(pk => Math.hypot(pk.x - p.x, pk.y - p.y) < R * 0.2)) {
                            pockets.push({x: p.x, y: p.y});
                        }
                    }
                }
            }
            
            boardShape = { type, cx, cy, r: R, vertices: verts, pockets: pockets };
            boardRect = { x: cx - R, y: cy - R, size: R * 2 };
        }

        function drawShapePath(ctx, shape, applyAudioDistortion = false) {
            ctx.beginPath();
            if (shape.vertices.length === 0) return;
            
            for(let i=0; i<shape.vertices.length; i++) {
                let v = shape.vertices[i];
                let px = v.x;
                let py = v.y;
                
                if (applyAudioDistortion && micEnabled && currentAudioLevel > 15) {
                    let bin = Math.floor((i / shape.vertices.length) * (dataArray.length / 2));
                    let force = (dataArray[bin] / 255) * (currentAudioLevel * 0.5);
                    let angle = Math.atan2(v.y - shape.cy, v.x - shape.cx);
                    px += Math.cos(angle) * force;
                    py += Math.sin(angle) * force;
                }

                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        }

        // --- RESIZE ---
        function resize() {
            WIDTH = canvas.width = window.innerWidth || 320;
            HEIGHT = canvas.height = window.innerHeight || 320;
            
            CA_W = Math.max(1, Math.ceil(WIDTH / CA_PIXEL));
            CA_H = Math.max(1, Math.ceil(HEIGHT / CA_PIXEL));
            
            ruliadCanvas.width = CA_W;
            ruliadCanvas.height = CA_H;
            caData = new Uint8Array(CA_W * CA_H);
            caData[Math.floor(CA_W / 2)] = 1;

            generateGeometry();
        }

        window.addEventListener('resize', () => { resize(); initBall(); });

        // --- GAME LOGIC ---
        function triggerTransition(holePoint) {
            gameState.state = 'TRANSITION';
            gameState.transitionTimer = 150; 
            gameState.sinkHole = holePoint;
            
            if (gameState.bounces > gameState.best) {
                gameState.best = gameState.bounces;
                const uiBest = document.getElementById('ui-best');
                if (uiBest) uiBest.innerText = gameState.best;
            }
            currentAudioLevel = 90; 
        }

        function nextDimension() {
            gameState.dimension++;
            
            const uiPanel = document.getElementById('ui-panel');
            if (uiPanel) {
                uiPanel.style.borderColor = '#f0f';
                setTimeout(() => uiPanel.style.borderColor = '#0ff', 300);
            }

            generateGeometry();
            
            const uiDim = document.getElementById('ui-dim');
            if (uiDim) uiDim.innerText = `${gameState.dimension} (${boardShape.type})`;

            currentRule = (currentRule + 1) % 8; 
            currentPalette = palettes[gameState.dimension % palettes.length];
            currentMunkerPair = munkerPairs[gameState.dimension % munkerPairs.length];

            caData.fill(0);
            trailData.fill(0);
            bData.fill(0);
            if (caData.length > 0) caData[Math.floor(CA_W / 2)] = 1;

            initBall();
        }

        // --- PHYSICS & BALL ---
        const POCKET_RADIUS = 30; 

        class Ball {
            constructor(x, y, vx, vy, radius) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.radius = radius;
                this.lastBounce = 0;
                this.angle = 0; 
                this.trueColor = '#ffffff'; 
            }

            update() {
                // Sonic Drive Impulse
                if (micEnabled && currentAudioLevel > 20) {
                    const dx = this.x - boardShape.cx;
                    const dy = this.y - boardShape.cy;
                    const dist = Math.hypot(dx, dy) || 1;
                    const force = (currentAudioLevel * 0.008) / (dist * 0.01);
                    this.vx += (dx / dist) * force;
                    this.vy += (dy / dist) * force;
                }

                const speed = Math.hypot(this.vx, this.vy);
                if (speed > 12) {
                    this.vx = (this.vx / speed) * 12;
                    this.vy = (this.vy / speed) * 12;
                }

                // Continuous Collision Detection Sub-stepping
                const subSteps = 2; 
                const dt = 1 / subSteps;
                let hitWallThisFrame = false;
                let minSubDistToPocket = Infinity;

                for (let step = 0; step < subSteps; step++) {
                    
                    // POCKET SINK & GRAVITY LOGIC
                    for (let p of boardShape.pockets) {
                        let dx = p.x - this.x;
                        let dy = p.y - this.y;
                        let dist = Math.hypot(dx, dy);
                        
                        // Subtle Gravity well to pull the ball in
                        let pullRadius = POCKET_RADIUS * 3.5; 
                        if (dist < pullRadius && dist > 0) {
                            let gravity = 4.0 * (1 - dist / pullRadius) * dt; 
                            this.vx += (dx / dist) * gravity;
                            this.vy += (dy / dist) * gravity;
                        }

                        if (dist < POCKET_RADIUS) {
                            triggerTransition(p); 
                            return; 
                        }
                    }

                    this.x += this.vx * dt; 
                    this.y += this.vy * dt;
                    this.angle += speed * 0.05 * dt;

                    // Write to Board CA
                    const caX = Math.floor(((this.x - boardRect.x) / boardRect.size) * B_CA_SIZE);
                    const caY = Math.floor(((this.y - boardRect.y) / boardRect.size) * B_CA_SIZE);
                    
                    let brushRadius = 1;
                    let injectionHeat = 120; 
                    if (micEnabled && currentAudioLevel > 15) {
                        brushRadius = Math.max(2, Math.floor(currentAudioLevel / 12));
                        injectionHeat = 255; 
                    }
                    
                    for(let dy = -brushRadius; dy <= brushRadius; dy++) {
                        for(let dx = -brushRadius; dx <= brushRadius; dx++) {
                            if(dx*dx + dy*dy <= brushRadius*brushRadius) {
                                const nx = caX + dx, ny = caY + dy;
                                if(nx >= 0 && nx < B_CA_SIZE && ny >= 0 && ny < B_CA_SIZE) {
                                    trailData[ny * B_CA_SIZE + nx] = injectionHeat;
                                }
                            }
                        }
                    }

                    // STRICT BULLETPROOF COLLISION
                    let overlapOffset = {x: 0, y: 0};
                    
                    for(let i=0; i<boardShape.vertices.length; i++) {
                        let A = boardShape.vertices[i];
                        let B = boardShape.vertices[(i+1)%boardShape.vertices.length];
                        
                        let dx = B.x - A.x;
                        let dy = B.y - A.y;
                        let len2 = dx*dx + dy*dy;
                        if(len2 === 0) continue;

                        let tLine = ((this.x - A.x) * dx + (this.y - A.y) * dy) / len2;
                        tLine = Math.max(0, Math.min(1, tLine)); 

                        let closestX = A.x + tLine * dx;
                        let closestY = A.y + tLine * dy;

                        let distX = this.x - closestX;
                        let distY = this.y - closestY;
                        let dist = Math.hypot(distX, distY);

                        if (dist < this.radius && dist > 0.01) {
                            let nx = distX / dist;
                            let ny = distY / dist;

                            let overlap = this.radius - dist;
                            overlapOffset.x += nx * overlap;
                            overlapOffset.y += ny * overlap;

                            let dot = this.vx * nx + this.vy * ny;
                            if (dot < 0) {
                                this.vx -= 2 * dot * nx;
                                this.vy -= 2 * dot * ny;
                                hitWallThisFrame = true;
                            }
                        }
                    }

                    this.x += overlapOffset.x;
                    this.y += overlapOffset.y;

                    // Emergency Pull-back
                    let dCenter = Math.hypot(this.x - boardShape.cx, this.y - boardShape.cy);
                    if (dCenter > boardShape.r + this.radius) {
                        let pX = boardShape.cx - this.x, pY = boardShape.cy - this.y;
                        let pLen = Math.hypot(pX, pY);
                        this.x += (pX / pLen) * 5;
                        this.y += (pY / pLen) * 5;
                    }
                    
                    if (hitWallThisFrame) {
                        for(let p of boardShape.pockets) {
                            let dToP = Math.hypot(this.x - p.x, this.y - p.y);
                            if (dToP < minSubDistToPocket) minSubDistToPocket = dToP;
                        }
                    }
                }

                // PRECISION MATH
                if (hitWallThisFrame) {
                    const detectionRadius = 80; 
                    if (minSubDistToPocket < detectionRadius && frameCount - this.lastBounce > 5) {
                        gameState.bounces++;
                        const calcPrecision = 1 - (minSubDistToPocket / detectionRadius);
                        
                        const uiPrecision = document.getElementById('ui-precision');
                        if (uiPrecision) uiPrecision.innerText = calcPrecision.toFixed(4);
                        
                        this.lastBounce = frameCount;
                        
                        const uiWinding = document.getElementById('ui-winding');
                        if (uiWinding) uiWinding.innerText = gameState.bounces;
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.beginPath(); ctx.arc(4, 4, this.radius, 0, Math.PI * 2); ctx.fill();

                ctx.rotate(this.angle);

                ctx.fillStyle = this.trueColor;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = '#aaa';
                ctx.beginPath(); ctx.arc(this.radius*0.2, 0, this.radius * 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(this.radius*0.2, 0, this.radius * 0.2, 0, Math.PI * 2); ctx.fill();

                ctx.restore();
            }
        }

        let playerBall;
        function initBall() {
            playerBall = new Ball(boardShape.cx - 20, boardShape.cy - 20, 3.5, 2.8, 16);
        }

        // --- RENDERING ---
        function updateBackgroundRuliad() {
            if (CA_W <= 0 || CA_H <= 0) return;

            for (let y = CA_H - 1; y > 0; y--) {
                for (let x = 0; x < CA_W; x++) {
                    caData[y * CA_W + x] = caData[(y - 1) * CA_W + x];
                }
            }
            
            let activeRule = 30;
            
            if (playerBall && gameState.state === 'PLAYING') {
                let ballCaX = Math.floor((playerBall.x / WIDTH) * CA_W);
                if (ballCaX >= 0 && ballCaX < CA_W) {
                    caData[ballCaX] = 1; 
                    caData[Math.max(0, ballCaX - 1)] = 1; 
                    caData[Math.min(CA_W - 1, ballCaX + 1)] = 1;
                }
            }

            if (micEnabled && currentAudioLevel > 15) {
                activeRule = Math.floor(currentAudioLevel) ^ (frameCount % 255);
                const step = Math.max(1, Math.floor((dataArray.length / 2) / CA_W));
                for (let x = 0; x < CA_W; x++) {
                    if (dataArray[x * step] > 80) caData[x] = 1;
                }
            } 

            for (let x = 0; x < CA_W; x++) {
                const left = caData[x === 0 ? CA_W - 1 : x - 1] ? 4 : 0;
                const center = caData[x] ? 2 : 0;
                const right = caData[x === CA_W - 1 ? 0 : x + 1] ? 1 : 0;
                
                if (caData[x] !== 1) {
                    caData[x] = (activeRule & (1 << (left + center + right))) ? 1 : 0;
                }
            }

            const imgData = rCtx.createImageData(CA_W, CA_H);
            const bgCol = currentPalette[0];
            const fgCol = currentPalette[2]; 

            // Unified dimension background rendering (no baseline flashing)
            for (let y = 0; y < CA_H; y++) {
                for (let x = 0; x < CA_W; x++) {
                    const i = y * CA_W + x;
                    const idx = i * 4;
                    if (caData[i] > 0) {
                        imgData.data[idx] = fgCol[0]; 
                        imgData.data[idx+1] = fgCol[1]; 
                        imgData.data[idx+2] = fgCol[2]; 
                        imgData.data[idx+3] = 255;
                    } else {
                        imgData.data[idx] = Math.floor(bgCol[0] * 0.15); 
                        imgData.data[idx+1] = Math.floor(bgCol[1] * 0.15); 
                        imgData.data[idx+2] = Math.floor(bgCol[2] * 0.15); 
                        imgData.data[idx+3] = 255;
                    }                   
                }
            }
            rCtx.putImageData(imgData, 0, 0);
        }

        function updateBoardRuliad() {
            // Fade Trail Data
            for(let i = 0; i < trailData.length; i++) {
                if(trailData[i] > 0) trailData[i] = Math.max(0, trailData[i] - 2);
            }

            // Cymatic Audio Ring Generator
            if (micEnabled && currentAudioLevel > 20) {
                for (let y = 0; y < B_CA_SIZE; y++) {
                    for (let x = 0; x < B_CA_SIZE; x++) {
                        let dx = x - B_CA_SIZE/2;
                        let dy = y - B_CA_SIZE/2;
                        let angle = Math.atan2(dy, dx);
                        let dist = Math.hypot(dx, dy);
                        
                        let bin = Math.floor((Math.abs(angle) / Math.PI) * (dataArray.length / 4));
                        let amp = dataArray[bin] || 0;
                        
                        if (amp > 100 && Math.abs(dist - (amp/255) * (B_CA_SIZE/2)) < 2) {
                             trailData[y * B_CA_SIZE + x] = 255;
                        }
                    }
                }
            }

            const imgData = bCtx.createImageData(B_CA_SIZE, B_CA_SIZE);
            const t = Math.floor(frameCount / 4);
            const audioShift = Math.floor(currentAudioLevel / 15);

            for (let y = 0; y < B_CA_SIZE; y++) {
                for (let x = 0; x < B_CA_SIZE; x++) {
                    let i = y * B_CA_SIZE + x;
                    
                    // Audio shifts coordinate space to warp rules
                    let cx = x - B_CA_SIZE/2 + audioShift;
                    let cy = y - B_CA_SIZE/2 - audioShift;
                    
                    // Neighborhood Average (Organic CA Feedback Loop)
                    let nSum = 0, nCount = 0;
                    if (x > 0) { nSum += bData[i - 1]; nCount++; }
                    if (x < B_CA_SIZE - 1) { nSum += bData[i + 1]; nCount++; }
                    if (y > 0) { nSum += bData[i - B_CA_SIZE]; nCount++; }
                    if (y < B_CA_SIZE - 1) { nSum += bData[i + B_CA_SIZE]; nCount++; }
                    let avg = nSum / nCount;

                    let vMath = 0;
                    const ruleMod = currentRule % 8;
                    
                    if (ruleMod === 0) vMath = (cx ^ cy);                           
                    else if (ruleMod === 1) vMath = (cx & cy);                      
                    else if (ruleMod === 2) vMath = (cx | cy);                      
                    else if (ruleMod === 3) vMath = Math.floor(Math.sqrt(cx*cx + cy*cy)); 
                    else if (ruleMod === 4) vMath = (cx * cx ^ cy * cy); 
                    else if (ruleMod === 5) vMath = (cx * cy) ^ cx;                
                    else if (ruleMod === 6) vMath = (cx+cy) ^ (cx-cy); 
                    else if (ruleMod === 7) vMath = Math.abs(cx * 2 ^ cy * 2); 
                    
                    // Generative math applies to ITSELF! (Feedback combination)
                    let val = Math.abs(vMath - t*2 + avg * 0.9 + trailData[i]*1.5);
                    bDataNext[i] = val % 256;
                    
                    // Assign to the 4 dimensional palette colors
                    let colorIndex = Math.floor(bDataNext[i] / 64) % 4; 
                    const c = currentPalette[colorIndex];
                    
                    let r = c[0], g = c[1], b = c[2];
                    
                    // High-contrast Voice / Trail Overrides
                    if (trailData[i] > 200) {
                        r = 255; g = 255; b = 0; 
                    } else if (trailData[i] > 50) {
                        r = 255; g = 0; b = 150; 
                    }

                    const idx = i * 4;
                    imgData.data[idx] = r;
                    imgData.data[idx+1] = g;
                    imgData.data[idx+2] = b;
                    imgData.data[idx+3] = 255;
                }
            }
            // Swap double buffer
            for (let i = 0; i < B_CA_SIZE * B_CA_SIZE; i++) bData[i] = bDataNext[i];
            
            bCtx.putImageData(imgData, 0, 0);
        }

        function drawBoard() {
            ctx.save();
            drawShapePath(ctx, boardShape, false); 
            ctx.clip(); 

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(boardCanvas, boardRect.x, boardRect.y, boardRect.size, boardRect.size);
            ctx.restore();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            drawShapePath(ctx, boardShape, true); 
            ctx.stroke();

            ctx.fillStyle = '#000';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            
            boardShape.pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            });
        }

        function drawThickMunkerWhite() {
            ctx.save();
            drawShapePath(ctx, boardShape);
            ctx.clip(); 
            
            const stripeH = 5; 
            
            for (let y = boardRect.y; y < boardRect.y + boardRect.size; y += stripeH * 4) {
                ctx.fillStyle = currentMunkerPair[0]; 
                ctx.fillRect(boardRect.x, y, boardRect.size, stripeH);
                
                ctx.fillStyle = currentMunkerPair[1];
                ctx.fillRect(boardRect.x, y + stripeH * 2, boardRect.size, stripeH);
            }
            ctx.restore();
        }

        function loop() {
            frameCount++;

            if (micEnabled) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                currentAudioLevel = sum / dataArray.length;
            }

            if (frameCount % 4 === 0) updateBackgroundRuliad();
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            if (ruliadCanvas.width > 0 && ruliadCanvas.height > 0) {
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(ruliadCanvas, 0, 0, WIDTH, HEIGHT);
            }

            // === THE VOID TUNNEL TRANSITION ===
            if (gameState.state === 'TRANSITION') {
                gameState.transitionTimer--;
                let prog = 1 - (gameState.transitionTimer / 150); 
                
                ctx.fillStyle = `rgba(0,0,0,${Math.min(1, prog * 1.5)})`;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);

                let cx = gameState.sinkHole.x;
                let cy = gameState.sinkHole.y;
                
                for (let i = 0; i < 15; i++) {
                    let ringT = (i / 15 + prog * 4) % 1; 
                    let scale = Math.pow(ringT, 4) * 6; 
                    let alpha = 1 - Math.abs(ringT - 0.5) * 2;
                    
                    ctx.save();
                    ctx.translate(cx, cy); 
                    ctx.scale(scale, scale);
                    ctx.rotate(prog * Math.PI * 2 + ringT * Math.PI);
                    ctx.translate(-cx, -cy);
                    
                    ctx.globalAlpha = Math.max(0, alpha);
                    // Match tunnel color to dimensional palette
                    let cIndex = i % 4;
                    ctx.strokeStyle = `rgb(${currentPalette[cIndex][0]}, ${currentPalette[cIndex][1]}, ${currentPalette[cIndex][2]})`;
                    ctx.lineWidth = 4 / scale; 
                    drawShapePath(ctx, boardShape, false);
                    ctx.stroke();
                    ctx.restore();
                }

                if (prog < 0.6) {
                    let ballScale = 1 - (prog / 0.6);
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.scale(ballScale, ballScale);
                    ctx.fillStyle = playerBall.trueColor;
                    ctx.beginPath(); ctx.arc(0, 0, playerBall.radius, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
                
                ctx.fillStyle = '#fff';
                ctx.font = '24px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.globalAlpha = Math.min(1, prog * 2);
                ctx.fillText("DIMENSION SHIFT", WIDTH/2, HEIGHT/2 - 20);
                ctx.font = '10px "Press Start 2P"';
                ctx.fillText(`SURVIVED: ${gameState.bounces} BOUNCES`, WIDTH/2, HEIGHT/2 + 20);
                ctx.globalAlpha = 1.0;

                if (gameState.transitionTimer <= 0) {
                    gameState.state = 'PLAYING';
                    gameState.bounces = 0;
                    const uiWinding = document.getElementById('ui-winding');
                    if (uiWinding) uiWinding.innerText = "0";
                    nextDimension();
                }
                
                requestAnimationFrame(loop);
                return; 
            }

            // === NORMAL PLAY ===
            updateBoardRuliad();
            drawBoard();

            if (playerBall) {
                playerBall.update();
                playerBall.draw(ctx);
            }

            drawThickMunkerWhite();

            requestAnimationFrame(loop);
        }

        generateGeometry(); 
        resize();
        initBall();
        loop();
    </script>
</body>
